name: Publish k8s-frontend Docker image to GHCR

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: k8s-example-frontend

jobs:
  push:
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.set_var.outputs.image_url }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            runnumber=${{ github.run_id }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Set image URL
        id: set_var
        run: | 
          TAG=${GITHUB_REF_NAME#v}
          echo "image_url=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$TAG" | tr [:upper:] [:lower:] >> $GITHUB_OUTPUT
  bump-image:
    runs-on: ubuntu-latest
    needs: 
      - push
    env:
      IMAGE_URL: ${{ needs.push.outputs.image_url }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout IAC repository
        uses: actions/checkout@v7
        with:
          repository: MaciejWojs/k8s-example-iac
          token: ${{ secrets.IAC_REPO_PAT }}

      - name: Create branch
        run: |
          BRANCH="image-bump-frontend-${GITHUB_RUN_ID}"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git switch -c "$BRANCH"

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install yq (YAML processor)
        run: |
          sudo snap install yq
      
      - name: Update image URL in ArgoCD Application manifest
        shell: bash
        run: |
          export VERSION=${{ needs.push.outputs.image_url }}
          yq eval-all -i '(. | select(.kind == "Deployment").spec.template.spec.containers[] | select(.name=="frontend").image) = env(VERSION)' k8s-example/frontend/frontend.yaml
      - name: Commit and push changes
        run: |
          git add .
          git commit -m "chore: Update frontend image to ${{ needs.push.outputs.image_url }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.IAC_REPO_PAT }}
        run: |
          gh pr create \
            --repo MaciejWojs/k8s-example-iac \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump frontend image" \
            --body "Automated frontend image bump from $GITHUB_REPOSITORY run $GITHUB_RUN_ID"